name: Scrape & Rebuild Calendar

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to push updated files back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Scrape concert data
        run: python scraper.py

      - name: Build HTML calendar
        run: python build_calendar.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add concerts_data.json concerts_calendar.html
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update concert data and calendar [$(date -u +'%Y-%m-%d')]"
            git push
          fi
